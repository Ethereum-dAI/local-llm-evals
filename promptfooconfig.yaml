# Local agent wallet — intent/payload eval.
# Run: PROMPTFOO_PYTHON=.venv/bin/python npx promptfoo@latest eval
#      npx promptfoo@latest view
# Requires OPENROUTER_API_KEY (loaded from .env).
description: Local agent wallet — executeTx/readTx/swap intent eval

prompts:
  - file://pf/prompt.py:render

# Two cheap OpenRouter models: gpt-4o-mini + Gemma 4 (closest hosted proxy to the
# shipped on-device Gemma 4 E4B).
providers:
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0.2
      max_tokens: 4096
      tools: file://pf/tools.json
  - id: openrouter:google/gemma-4-26b-a4b-it
    config:
      temperature: 0.2
      max_tokens: 4096
      tools: file://pf/tools.json
  - id: openrouter:openai/gpt-5
    config:
      temperature: 0.1
      max_tokens: 4096
      tools: file://pf/tools.json
  # Local GGUF served in-process via llama-cpp-python (see pf/provider_functiongemma.py).
  # Needs the optional `local` dep group: run with
  #   uv sync --group local   (once)   then   scripts/eval.sh -o functiongemma.out.json
  # Not on OpenRouter — it's a 270M on-device model, later fine-tuned on Unsloth.
  - id: file://pf/provider_functiongemma.py:call_api
    label: functiongemma-270m-it
    config:
      repo_id: unsloth/functiongemma-270m-it-GGUF
      filename: "*Q8_0.gguf"
      n_ctx: 4096
      temperature: 0.2
      max_tokens: 1024

# Single binary scorer reused as a python assertion (reads gold from test metadata).
defaultTest:
  assert:
    - type: python
      value: file://pf/assert.py

# Dataset is env-switchable; defaults to the generated set.
#   default                     -> pf/tests.generated.yaml
#   EVAL_DATASET=pf/tests.yaml  -> curated recognition-derived set
tests: "file://{{ env.EVAL_DATASET | default('pf/tests.generated.yaml') }}"
