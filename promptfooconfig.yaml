# Local agent wallet — intent/payload eval.
# Run: PROMPTFOO_PYTHON=.venv/bin/python npx promptfoo@latest eval
#      npx promptfoo@latest view
# Requires OPENROUTER_API_KEY (loaded from .env).
description: Local agent wallet — executeTx/readTx/swap intent eval

prompts:
  - file://pf/prompt.json

# Two cheap OpenRouter models: gpt-4o-mini + Gemma 4 (closest hosted proxy to the
# shipped on-device Gemma 4 E4B).
providers:
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0.2
      max_tokens: 512
      tools: file://pf/tools.json
  - id: openrouter:google/gemma-4-26b-a4b-it
    config:
      temperature: 0.2
      max_tokens: 512
      tools: file://pf/tools.json

# Single binary scorer reused as a python assertion (reads gold from test metadata).
defaultTest:
  assert:
    - type: python
      value: file://pf/assert.py

# Single source of truth for test cases (generated by scripts/convert_recognition.py).
tests: file://pf/tests.yaml
