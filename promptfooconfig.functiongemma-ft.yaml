# Fine-tuned FunctionGemma ONLY (base + OpenRouter baselines already measured
# elsewhere). Local GGUF, no API cost. Run:
#   scripts/eval.sh -c promptfooconfig.functiongemma-ft.yaml -o functiongemma.ft.out.json
description: FunctionGemma fine-tuned (local GGUF)

prompts:
  - file://pf/prompt.py:render

providers:
  - id: file://pf/provider_functiongemma.py:call_api
    label: functiongemma-ft
    config:
      model_path: models/functiongemma-270m-ft-modal.Q8_0.gguf
      n_ctx: 4096
      temperature: 0.2
      max_tokens: 1024

defaultTest:
  assert:
    - type: python
      value: file://pf/assert.py

tests: "file://{{ env.EVAL_DATASET | default('pf/tests.generated.yaml') }}"
